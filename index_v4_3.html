<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0b0d0f" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="icons/bread-32.png" />
  <title>LM ↔ Hefe – Umrechner</title>
  <style>
    :root{--bg:#0b0d0f;--card:#121419;--muted:#9aa4b2;--fg:#eef2f6;--accent:#4ea1ff;--ok:#3ddc97;--warn:#ffb86b}
    @media (prefers-color-scheme: light){:root{--bg:#ffffff;--card:#f6f8fa;--muted:#57606a;--fg:#0f1720;--accent:#0969da}}
    html,body{background:var(--bg);color:var(--fg);margin:0;font:16px/1.45 system-ui,-apple-system,Segoe UI,Roboto,"DejaVu Sans",Arial;-webkit-text-size-adjust:100%}
    .wrap{max-width:980px;margin:0 auto;padding:calc(env(safe-area-inset-top,0) + 12px) 16px 16px}
    header{display:flex;align-items:center;gap:12px;padding:2px 0 10px}
    .logo{width:36px;height:36px;border-radius:10px;background:url('icons/bread-32.png') center/cover no-repeat;box-shadow:0 0 0 1px rgba(255,255,255,.08)}
    h1{font-size:1.18rem;margin:0}
    .muted{color:var(--muted)}
    .card{background:var(--card);border:1px solid rgba(255,255,255,.09);border-radius:14px;padding:14px;box-shadow:0 6px 20px rgba(0,0,0,.25)}
    label{display:block;font-size:.92rem;margin:.35rem 0 .2rem;color:var(--muted)}
    input[type=number]{width:100%;padding:0.78rem 0.85rem;border:1px solid rgba(255,255,255,.18);border-radius:12px;background:transparent;color:var(--fg);font-size:17px;font-weight:600}
    input::placeholder{color:#8b949e}
    .grid{display:grid;grid-template-columns:1fr;gap:12px}
    @media(min-width:760px){.grid{grid-template-columns:1fr 1fr}}
    .seg{display:flex;gap:8px;margin:10px 0}
    .seg .seg-btn{flex:1;text-align:center;padding:0.78rem;border-radius:12px;border:1px solid rgba(255,255,255,.18);cursor:pointer;user-select:none}
    .seg .seg-btn[aria-pressed="true"], .seg .seg-btn[aria-selected="true"]{background:linear-gradient(180deg, rgba(78,161,255,.25), rgba(78,161,255,.05));border-color:rgba(78,161,255,.5)}
    .actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
    button{appearance:none;border:0;border-radius:12px;padding:0.78rem 1rem;font-weight:800;color:#0b0d0f;background:var(--accent);cursor:pointer}
    button.secondary{background:#30363d;color:#c9d1d9}
    .out{border:1px dashed rgba(255,255,255,.18);border-radius:12px;padding:.85rem .95rem;margin-top:.7rem}
    .kpi{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
    @media(min-width:820px){.kpi{grid-template-columns:repeat(4,1fr)}}
    .box{background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:.7rem}
    .box h3{font-size:.92rem;margin:.1rem 0;color:var(--muted)}
    .val{font-size:1.25rem;font-weight:900}
    .hr{height:1px;background:rgba(255,255,255,.12);margin:.7rem 0}
    .small{font-size:.86rem}
    .slider-row{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center}
    input[type=range]{width:100%;height:36px;appearance:none;background:transparent}
    input[type=range]::-webkit-slider-runnable-track{height:6px;background:#2a3340;border-radius:999px}
    input[type=range]::-webkit-slider-thumb{appearance:none;width:28px;height:28px;border-radius:50%;margin-top:-11px;background:var(--accent);border:2px solid #0b0d0f}
    input[type=range]::-moz-range-track{height:6px;background:#2a3340;border-radius:999px}
    input[type=range]::-moz-range-thumb{width:28px;height:28px;border-radius:50%;background:var(--accent);border:2px solid #0b0d0f}
    @media (min-width:430px) and (max-width:460px){ .wrap{max-width:600px} }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="logo" aria-hidden="true"></div>
      <h1>Lievito Madre ↔ Hefe – Umrechner</h1>
    </header>

    <section class="card" aria-label="Eingaben">
      <div class="grid">...
    </section>

<script>
// Placeholder minimal script to ensure file exists in this environment
</script>
</body>
</html>
